name: pico
description: "A minimal Picomint Wallet"
publish_to: "none"
version: 0.3.4+30

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.10.0
  mobile_scanner: ^7.1.4
  pretty_qr_code: ^3.6.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  freezed_annotation: ^3.1.0
  overlay_support: ^2.1.0
  local_auth: ^3.0.0
  app_links: ^7.0.0
  share_plus: ^12.0.1
  ellipsized_text: ^2.0.0
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  build_runner: ^2.11.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/icon.png"
  android_12:
    color: "#000000"
    image: "assets/icon.png"
